<!DOCTYPE html>
<html lang="uk">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Каталог навчальних ресурсів</title>
  <link rel="stylesheet" href="./src/styles.css" />
</head>

<body>
  <main>
    <h2>Каталог навчальних ресурсів з рейтингом</h2>

    <div id="notice" class="notice"></div>
    <section id="users-section">
      <h2>Користувач</h2>
      <form id="userForm">
        <label for="userName">Нікнейм:</label>
        <input type="text" id="userName" placeholder="Нікнейм" required />

        <label for="userEmail">Електронна адреса:</label>
        <input type="email" id="userEmail" placeholder="Email" required />

        <label for="userRole">Тип акаунту:</label>
        <select id="userRole">
          <option value="student">Студент</option>
          <option value="teacher">Викладач</option>
          <option value="admin">Адміністратор</option>
        </select>

        <button id="submitUserBtn" type="submit">Створити акаунт</button>
      </form>
    </section>

    <section>
      <h2>Додати / редагувати ресурс</h2>
      <form id="resourceForm">
        <label for="resUserId">Автор (користувач):</label>
        <select id="resUserId" class="user-select" required>
          <option value="">Оберіть користувача</option>
        </select>

        <label for="resTitle">Назва:</label>
        <input type="text" id="resTitle" placeholder="Назва (мін. 3 символи)" required />
        <p id="title_error" class="error-text"></p>

        <label for="resLink">Посилання:</label>
        <input type="url" id="resLink" placeholder="https://..." required />
        <p id="link_error" class="error-text"></p>

        <label for="resType">Тип:</label>
        <select id="resType" required>
          <option value="">Оберіть тип</option>
          <option value="book">Книга</option>
          <option value="article">Стаття</option>
          <option value="video">Відео</option>
          <option value="website">Сайт</option>
        </select>
        <p id="type_error" class="error-text"></p>

        <label for="resAuthor">Автор матеріалу:</label>
        <input type="text" id="resAuthor" placeholder="Прізвище та ім'я" />
        <p id="author_error" class="error-text"></p>

        <label for="resDescription">Опис (опціонально):</label>
        <textarea id="resDescription" rows="3"></textarea>

        <button id="submitResourceBtn" type="submit">Додати ресурс</button>
        <button id="cancelEditBtn" type="button">Скасувати</button>
      </form>
    </section>

    <section>
      <h2>Список ресурсів</h2>

      <div class="filters">
        <select id="filterType">
          <option value="">Всі типи</option>
          <option value="book">Книга</option>
          <option value="article">Стаття</option>
          <option value="video">Відео</option>
          <option value="website">Сайт</option>
        </select>

        <select id="sortBy">
          <option value="createdAt">За датою додавання</option>
          <option value="title">За назвою</option>
        </select>

        <select id="sortDir">
          <option value="desc">Спадання</option>
          <option value="asc">Зростання</option>
        </select>
      </div>

      <div id="resourcesStatus"></div>

      <table id="itemsTable">
        <thead>
          <tr>
            <th>Назва</th>
            <th>Тип</th>
            <th>Автор</th>
            <th>Посилання</th>
            <th>Дії</th>
          </tr>
        </thead>
        <tbody id="resourcesTableBody"></tbody>
      </table>
    </section>

    <section>
      <h2>Топ ресурси за відгуками</h2>
      <div id="topLikedStatus"></div>
      <div id="topLikedList"></div>
    </section>

    <section id="feedback-section">
      <h2>Залишити відгук</h2>
      <form id="feedbackForm">
        <label for="feedbackResource">Ресурс:</label>
        <select id="feedbackResource" required>
          <option value="">Оберіть ресурс для відгуку</option>
        </select>

        <label for="feedbackUserId">Ви — це:</label>
        <select id="feedbackUserId" class="user-select" required>
          <option value="">Оберіть свого користувача</option>
        </select>

        <label for="feedbackRating">Оцінка (1–5):</label>
        <input type="number" id="feedbackRating" min="1" max="5" value="5" />

        <label for="feedbackComment">Ваш коментар:</label>
        <textarea id="feedbackComment" rows="2" placeholder="Що ви думаєте про цей ресурс?"></textarea>

        <button id="submitFeedbackBtn" type="submit" class="buttons">Опублікувати</button>
      </form>

      <div id="comments-section">
        <h3>Відгуки користувачів</h3>
        <div id="feedbackStatus"></div>
        <div id="feedbackList"></div>
      </div>
    </section>

  </main>

  <script type="module" src="./src/main.ts"></script>
</body>

</html>
