<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title> ЛР-1 </title>

    <link rel="stylesheet" href="styles.css" />
    <script src="app.js" defer></script>
</head>

<body>
    <main>
        <h1>Лабораторна робота №1</h1>
        <h3>Варіант №5</h3>
        <h2>Каталог навчальних ресурсів з рейтингом</h2>
        <section id="users-section">
            <h2>Користувач</h2>
            <form id="user-form">
                <label for="username">Нікнейм: </label>
                <input type="text" id="username" placeholder="Нікнейм" required>
                <label for="email">Електронна адреса: </label>
                <input type="email" id="email" placeholder="Email" required>
                <label for="userRole">Тип акаунту: </label>
                <select id="userRole">
                    <option value="user">Користувач</option>
                    <option value="admin">Адміністратор</option>
                </select>
                <button type="submit">Створити акаунт</button>
            </form>
        </section>
        <section>
            <h2>Додати ресурс</h2>
            <form id="form">
                <label for="title">Назва: </label>
                <input type="text" id="title" name="title" required>
                <p id="title_error" class="error-text"></p>

                <label for="link">Посилання:</label>
                <input type="url" id="link" name="link" required>
                <p id="link_error" class="error-text"></p>

                <label for="statusSelect">Тип</label>
                <select id="statusSelect" required>
                    <option value="">Оберіть статус</option>
                    <option value="book">Книга</option>
                    <option value="website">Сайт</option>
                    <option value="video">Відео</option>
                    <option value="research">Дослідження</option>
                    <option value="Authors">Авторське</option>
                </select>
                <p id="status_error" class="error-text"></p>

                <label for="descriptionInput">Опис</label>
                <textarea id="descriptionInput" rows="3"></textarea>
                <p id="description_error" class="error-text"></p>

                <label for="author">Автор</label>
                <input type="text" id="author" name="author">
                <p id="author_error" class="error-text"></p>

                <button type="submit">Додати</button>
            </form>
        </section>
        <section>
            <h2>Список ресурсів</h2>
            <input type="text" id="searchInput" placeholder="Пошук за назвою" class="search">
            <label for="filterType" class="filter">
                <select id="filterType">
                    <option value="all">Всі</option>
                    <option value="book">Книга</option>
                    <option value="website">Сайт</option>
                    <option value="video">Відео</option>
                    <option value="research">Дослідження</option>
                    <option value="Authors">Авторське</option>
                </select>
            </label>
            <button id="sortTitleBtn" class="buttons">Sort by name</button>
            <button id="sortTypeBtn" class="buttons">Sort by type</button>
            <table id="itemsTable">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Назва</th>
                        <th>Тип</th>
                        <th>Автор</th>
                        <th>Дії</th>
                    </tr>
                </thead>
                <tbody id="itemsTableBody">
                </tbody>
            </table>
        </section>
        <section id="feedback-section">
            <h2>Залишити відгук</h2>
            <label for="userSelect">Ви — це:</label>
            <select id="userSelect" required>
                <option value="">Оберіть свого користувача</option>
            </select>
            <form id="feedback-form">
                <label for="targetResource">Ресурс:</label>
                <select id="targetResource" required>
                    <option value="">Оберіть ресурс для відгуку</option>
                </select>

                <label for="ratingScore">Оцінка (1-5):</label>
                <input type="number" id="ratingScore" min="1" max="5" value="5">

                <label for="commentText">Ваш коментар:</label>
                <textarea id="commentText" rows="2" placeholder="Що ви думаєте про цей ресурс?"></textarea>

                <button type="submit" class="buttons">Опублікувати</button>
            </form>
            <div id="comments-section">
                <h3>Відгуки користувачів</h3>
                <div id="commentsList">
                </div>
            </div>
        </section>

    </main>

</body>

</html>
